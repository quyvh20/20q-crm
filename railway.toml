[build]
builder = "NIXPACKS"
buildCommand = "cd crm-backend && go build -o bin/server cmd/server/main.go"
nixpacksConfigPath = "nixpacks.toml"

[deploy]
startCommand = "cd crm-backend && if [ ! -f 'migrate' ]; then curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz; fi && (./migrate -path ./migrations -database \"$DATABASE_URL\" up || true) && ./bin/server"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
