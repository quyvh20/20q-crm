name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Vet & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: crm-backend/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -timeout 300s ./...

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: crm-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: crm-backend/go.sum

      - name: Build
        run: go build -o bin/server cmd/server/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: crm-backend/bin/server
