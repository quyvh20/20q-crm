name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Vet & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: crm-backend/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -short -timeout 300s ./...

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: crm-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: crm-backend/go.sum

      - name: Build
        run: go build -o bin/server cmd/server/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: crm-backend/bin/server

  # The backend previously relied on Railway's GitHub auto-deploy, which stopped
  # picking up pushes (commits sat undeployed while CI was green — the "Build
  # Binary" artifact was never consumed by anything). Deploy explicitly with the
  # Railway CLI instead, using the RAILWAY_TOKEN project token that already exists
  # in the repo secrets. `railway up` uploads crm-backend/ as the build context
  # (railway.toml + nixpacks.toml at its root, same as the dashboard builds).
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: crm-backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy via Railway CLI
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Show the project for the logs (non-fatal if the CLI output shape changes).
          railway status || true
          # Resolve the backend service name from the project, excluding datastores;
          # fall back to likely names so a CLI JSON-shape change doesn't break deploys.
          SVC=$(railway status --json 2>/dev/null \
            | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);const edges=(j.services&&j.services.edges)||[];const names=edges.map(e=>e.node&&e.node.name).filter(Boolean);console.log(names.find(n=>!/postgres|redis|mysql|db/i.test(n))||'')}catch(e){console.log('')}})" \
            || true)
          echo "Resolved service: '${SVC}'"
          deploy() { railway up --service "$1" --detach && echo "Deployed via service '$1'"; }
          if [ -n "$SVC" ] && deploy "$SVC"; then exit 0; fi
          for guess in 20q-crm 20q-crm-production crm-backend backend web; do
            if deploy "$guess"; then exit 0; fi
          done
          echo "::error::Could not resolve the Railway service name — deploy manually or fix the guesses above."
          exit 1

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: crm-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: crm-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # No VITE_API_URL: the SPA calls a same-origin /api, which the Pages
      # Function in crm-frontend/functions/api proxies to the backend. This keeps
      # the auth cookie first-party (see that file) — cross-site third-party
      # cookies are now blocked by browsers and broke login.
      - name: Build (same-origin API via the Pages /api proxy)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=20q-crm --branch=main --commit-dirty=true
          workingDirectory: crm-frontend

