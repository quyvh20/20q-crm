name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Vet & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: crm-backend/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -timeout 300s ./...

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: crm-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: crm-backend/go.sum

      - name: Build
        run: go build -o bin/server cmd/server/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: crm-backend/bin/server

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: crm-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: crm-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with production API URL
        run: npm run build
        env:
          VITE_API_URL: https://20q-crm-production.up.railway.app

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=20q-crm --branch=main --commit-dirty=true
          workingDirectory: crm-frontend

